<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riff - Music Player</title>
    <!-- Standard favicon for browsers -->
    <link rel="icon" href="{{ url_for('static', filename='assets/site_logo.png') }}" type="image/x-icon">
    <!-- Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='assets/site_logo.jpg') }}">

    <!-- FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cal+Sans&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
    <link rel="stylesheet" href=" {{ url_for('static' , filename='css/header-bar.css')}}">
</head>
<body>
    <div class="header-bar">
        <div class="upload-form">

            <button class="upload-btn-modern" id="openUpload">

                <img 
                src="{{ url_for('static', filename='assets/upload_icon.svg')}}"
                class="upload-header-icon">

                <span>
                    Add Music
                </span>

            </button>

        </div>
        <div class="search-bar">
            <!-- add on click for searchbtnbg -->
            <div class="searchbtnbg">
                <img id="searchIcon" src=" {{ url_for('static' , filename='assets/search_icon.svg')}} " alt="Search">
            </div>
            <input id="searchInput" class="search-text" type="text" placeholder="Search Song...">
            <div id="clearSearch">✕</div>
        </div>
    </div>
    <div class="main-view">
        <div class="view-switcher-wrapper">
            <div class="view-switcher">
                <button class="view-btn active" id="songs-btn"> 
                    Songs
                </button>
                
                <button class="view-btn" id="playlists-btn">
                    Playlists
                </button>
                <div class="indicator"></div>
            </div>
        </div>
        {% include "components/song-list.html" %}
        <div class="playlist-list">
            {% for playlist in playlists %}
            <a href="{{ url_for('playlist_page', playlist_id=playlist.id) }}" class="playlist-card">
                <div class="playlist-cover">
                    <img
                        src="{{ playlist.cover}}"
                        alt="{{ playlist.name }}"
                    >
                </div>
                <div class="playlist-card-info">
                    <h3>{{ playlist.name }}</h3>
                    <p>{{ playlist.song_count }} Songs</p>
                </div>

            </a>
            {% endfor %}
        </div>

    </div>
    {% include 'components/bottom-bar.html' %}
    {% include "components/create-playlist-modal.html" %}
    <audio id="audio"></audio>

    <div id="songListEl" data-songs='{{ songs | tojson | safe }}'></div>     <!-- | tojson converts python objects to JS String -->

    <div class="upload-modal" id="uploadModal">

        <div class="upload-box">
            <div class="upload-close" id="closeUpload">
                ✕
            </div>

            
            <h2>
                Add music
            </h2>
            
            <label class="upload-drop">
                <img 
                src="{{ url_for('static', filename='assets/upload_icon.svg')}}"
                class="upload-big-icon"
                id="uploadAnimation">

                <div class="upload-drop-title">
                    Drop MP3 here
                </div>

                <div class="upload-drop-subtitle">
                    or click to browse
                </div>

                <input 
                type="file"
                id="songFile"
                accept=".mp3"
                hidden>

            </label>


            <div class="upload-progress-wrapper">

                <div class="upload-progress-text">
                    Uploading...
                </div>
                <div class="upload-progress">
                    <div 
                    class="upload-progress-fill"
                    id="uploadProgress">
                    </div>
                </div>
            </div>


                <div id="uploadStatus">
                </div>


        </div>

    </div>
</body>
<!-- JS -->
<script src="{{ url_for('static', filename='js/index.js') }}"></script>
<script src="{{ url_for('static', filename='js/player.js') }}"></script>
</html>
